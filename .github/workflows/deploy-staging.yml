name: Deploy

on:
  push:
    branches:
      - staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy
        run: ./deploy-erpu-saas.sh staging1
        env:
          ERPUSAAS_DEPLOY_SECRET: ${{ secrets.ERPUSAAS_DEPLOY_SECRET }}
          ERPUSAAS_DEPLOY_PROJECT: ${{ vars.ERPUSAAS_DEPLOY_PROJECT }}
          ERPUSAAS_API_URL: ${{ vars.ERPUSAAS_API_URL }}
